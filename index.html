<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Happy Birthday, Alex</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d1117;
    color: #58a6ff;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    min-height: 100vh;
    padding: 16px;
  }

  .terminal {
    width: 100%;
    max-width: 820px;
    margin: 0 auto;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(88, 166, 255, 0.08);
  }

  .titlebar {
    background: #21262d;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid #30363d;
  }

  .titlebar-text { color: #8b949e; font-size: 12px; flex: 1; text-align: center; }

  .win-btn {
    width: 46px; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: #8b949e;
    cursor: default;

    margin: -12px 0;
  }
  .win-btn:hover { background: #30363d; }
  .win-btn.close:hover { background: #e81123; color: #fff; }

  .content {
    padding: 24px 28px 32px;
    min-height: 200px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .line {
    line-height: 1.75;
    font-size: 11px;
    white-space: pre;
  }

  @media (min-width: 560px) {
    .line { font-size: 13.5px; }
    .banner-box { font-size: 11.5px !important; }
  }

  .spacer { height: 6px; }

  .prompt   { color: #3fb950; }
  .cmd      { color: #e6edf3; }
  .comment  { color: #8b949e; }
  .success  { color: #3fb950; }
  .warning  { color: #d29922; }
  .info     { color: #58a6ff; }
  .rare     { color: #c678dd; font-weight: 700; }
  .epic     { color: #f0883e; font-weight: 700; }
  .legendary{ color: #ffd700; font-weight: 700; }
  .hp       { color: #f87171; }
  .mana     { color: #60a5fa; }
  .xp       { color: #34d399; }
  .stat     { color: #a3e635; }

  .cursor {
    display: inline-block;
    width: 8px; height: 14px;
    background: #58a6ff;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  .banner-box {
    color: #f0883e;
    font-size: 11.5px;
    line-height: 1.35;
    margin: 4px 0 6px;
  }

  .creeper-box {
    color: #3fb950;
    font-size: 13px;
    line-height: 1.4;
    margin: 4px 0;

</style>

<body>
<div class="terminal">
  <div class="titlebar">

</div>

<script>
const output = document.getElementById('output');

// в”Җв”Җ helpers в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

function addSpacer() {
  const d = document.createElement('div');
  d.className = 'spacer';
  output.appendChild(d);
}

function addLine(text, cls) {
  const d = document.createElement('div');
  d.className = 'line';
  if (cls) {
    const s = document.createElement('span');
    s.className = cls;
    s.textContent = text;
    d.appendChild(s);
  } else {
    d.textContent = text;
  }
  output.appendChild(d);
  output.scrollTop = output.scrollHeight;
  return d;
}

function addPre(lines, cls) {
  const pre = document.createElement('pre');
  pre.className = cls + ' line';
  pre.textContent = lines.join('\n');
  output.appendChild(pre);
  output.scrollTop = output.scrollHeight;
}

// typewrite into a freshly created line, returns promise
function typewriteLine(text, promptCls, textCls, speed = 36) {
  return new Promise(resolve => {
    const d = document.createElement('div');
    d.className = 'line';

    const ps = document.createElement('span');
    ps.className = promptCls;
    ps.textContent = '$ ';
    d.appendChild(ps);

    const ts = document.createElement('span');
    ts.className = textCls;
    d.appendChild(ts);
    output.appendChild(d);

    let i = 0;
    function tick() {
      if (i < text.length) {
        ts.textContent += text[i++];
        output.scrollTop = output.scrollHeight;
        setTimeout(tick, speed);
      } else {
        resolve();
      }
    }
    tick();
  });
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

function addCursor() {
  const d = document.createElement('div');
  d.className = 'line';
  const ps = document.createElement('span');
  ps.className = 'prompt';
  ps.textContent = '$ ';
  const c = document.createElement('span');
  c.className = 'cursor';
  d.appendChild(ps);
  d.appendChild(c);
  output.appendChild(d);
}

// в”Җв”Җ content в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

const banner = [
  ' в–Ҳв–Ҳв•—  в–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв•—   в–Ҳв–Ҳв•—',
  ' в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в•ҡв–Ҳв–Ҳв•— в–Ҳв–Ҳв•”в•қ',
  ' в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ ',
  ' в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•җв•қ в–Ҳв–Ҳв•”в•җв•җв•җв•қ   в•ҡв–Ҳв–Ҳв•”в•қ  ',

  ' в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в•ҡв•җв•җв–Ҳв–Ҳв•”в•җв•җв•қв–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в•ҡв–Ҳв–Ҳв•— в–Ҳв–Ҳв•”в•қ',
  ' в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ   в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘ в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ ',
  ' в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—   в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘  в•ҡв–Ҳв–Ҳв•”в•қ  ',
  ' в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘   ',
  ' в•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қ   в•ҡв•җв•қ   в•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•җв•җв•җв•җв•қ в•ҡв•җв•қ  в•ҡв•җв•қ   в•ҡв•җв•қ   ',
];

// в”Җв”Җ main sequence в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

async function run() {

  addLine('Last login: Today  вҖ”  welcome back, hero.', 'comment');
  await wait(500);
  addSpacer();

  // вҖ” git log вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”вҖ”

  addLine('в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө', 'info');
  await wait(120);
  addLine('в”Ӯ  вқӨ  HP         в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–‘в–‘  +15 MAX   в”Ӯ', 'hp');
  await wait(120);
  addLine('в”Ӯ  рҹ’§ MANA       в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–‘  +20 MAX   в”Ӯ', 'mana');

function msUntilMidnight() {
  const now = new Date();
  const midnight = new Date(now);
  midnight.setHours(24, 0, 0, 0);
  return midnight - now;
}

function selfDestruct() {
  const content = document.getElementById('output');
  const lines = [
    { text: '', delay: 0 },
    { text: '$ sudo birthday --self-destruct', cls: 'warning', delay: 200 },
    { text: '', delay: 700 },
    { text: '[WARNING] This message was valid for one day only.', cls: 'warning', delay: 900 },
    { text: '[WARNING] Initiating self-destruct sequence...', cls: 'warning', delay: 1400 },
    { text: '', delay: 1900 },
    { text: '3...', cls: 'hp', delay: 2100 },
    { text: '2...', cls: 'hp', delay: 2800 },
    { text: '1...', cls: 'hp', delay: 3500 },
    { text: '', delay: 4000 },
    { text: '[OK] Memory wiped. Hope it was a good one, Alex. рҹҺӮ', cls: 'success', delay: 4200 },
    { text: '[OK] See you next year.', cls: 'comment', delay: 4900 },
  ];

  lines.forEach(({ text, cls, delay }) => {
    setTimeout(() => {
      addLine(text, cls || '');
      output.scrollTop = output.scrollHeight;
    }, delay);
  });

  // After animation: blank the page
  setTimeout(() => {
    document.body.innerHTML = '<div style="background:#0d1117;height:100vh;display:flex;align-items:center;justify-content:center;font-family:monospace;color:#8b949e;font-size:14px;">// nothing to see here</div>';
  }, 7000);
}

setTimeout(selfDestruct, msUntilMidnight());
</script>
