<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday, Alex</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d1117;
    color: #58a6ff;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    min-height: 100vh;
    padding: 16px;
  }

  .terminal {
    width: 100%;
    max-width: 820px;
    margin: 0 auto;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(88,166,255,0.08);
  }

  .titlebar {
    background: #21262d;
    padding: 0 0 0 16px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid #30363d;
    height: 36px;
  }

  .titlebar-text { color: #8b949e; font-size: 12px; flex: 1; }

  .win-btn {
    width: 46px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    color: #8b949e; font-size: 13px; cursor: default;
  }
  .win-btn:hover { background: #30363d; }
  .win-btn.close:hover { background: #e81123; color: #fff; }

  .content {
    padding: 24px 28px 32px;
    min-height: 200px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .line {
    line-height: 1.75;
    font-size: 11px;
    white-space: pre;
  }

  @media (min-width: 560px) {
    .line { font-size: 13.5px; }
    .banner-box { font-size: 11.5px !important; }
  }

  .spacer { height: 6px; }

  .countdown-bar {
    text-align: center;
    padding: 10px 16px 14px;
    font-size: 12px;
    color: #8b949e;
    border-top: 1px solid #30363d;
    letter-spacing: 0.05em;
  }
  .countdown-bar span { color: #f87171; font-weight: 700; }

  .cursor {
    display: inline-block;
    width: 8px; height: 14px;
    background: #58a6ff;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
<div class="terminal">
  <div class="titlebar">
    <span class="titlebar-text">alex@birthday ~ bash</span>
    <div class="win-btn">&#x2013;</div>
    <div class="win-btn">&#x25A1;</div>
    <div class="win-btn close">&#x2715;</div>
  </div>
  <div class="content" id="output"></div>
  <div class="countdown-bar" id="countdown-bar">
    &#x23F3; This message self-destructs in <span id="countdown-timer">--:--:--</span>
  </div>
</div>

<script>
const output = document.getElementById('output');

const BANNER = [
  ' \u2588\u2588\u2557  \u2588\u2588\u2557 \u2588\u2588\u2588\u2588\u2588\u2557\u2588\u2588\u2588\u2588\u2588\u2588\u2557 \u2588\u2588\u2588\u2588\u2588\u2588\u2557 \u2588\u2588\u2557   \u2588\u2588\u2557',
  ' \u2588\u2588\u2551  \u2588\u2588\u2551\u2588\u2588\u2554\u2550\u2550\u2588\u2588\u2557\u2588\u2588\u2554\u2550\u2550\u2588\u2588\u2557\u2588\u2588\u2554\u2550\u2550\u2588\u2588\u2557\u255a\u2588\u2588\u2557 \u2588\u2588\u2554\u255d',
  ' \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2551\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2551\u2588\u2588\u2588\u2588\u2588\u2588\u2554\u255d\u2588\u2588\u2588\u2588\u2588\u2588\u2554\u255d \u255a\u2588\u2588\u2588\u2588\u2554\u255d ',
  ' \u2588\u2588\u2554\u2550\u2550\u2588\u2588\u2551\u2588\u2588\u2554\u2550\u2550\u2588\u2588\u2551\u2588\u2588\u2554\u2550\u2550\u2550\u255d \u2588\u2588\u2554\u2550\u2550\u2550\u255d   \u255a\u2588\u2588\u2554\u255d  ',
  ' \u2588\u2588\u2551  \u2588\u2588\u2551\u2588\u2588\u2551  \u2588\u2588\u2551\u2588\u2588\u2551     \u2588\u2588\u2551        \u2588\u2588\u2551   ',
  ' \u255a\u2550\u255d  \u255a\u2550\u255d\u255a\u2550\u255d  \u255a\u2550\u255d\u255a\u2550\u255d     \u255a\u2550\u255d        \u255a\u2550\u255d   ',
  '',
  ' \u2588\u2588\u2588\u2588\u2588\u2588\u2557 \u2588\u2588\u2557\u2588\u2588\u2588\u2588\u2588\u2588\u2557 \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2557\u2588\u2588\u2557  \u2588\u2588\u2557\u2588\u2588\u2588\u2588\u2588\u2588\u2557  \u2588\u2588\u2588\u2588\u2588\u2557 \u2588\u2588\u2557   \u2588\u2588\u2557',
  ' \u2588\u2588\u2554\u2550\u2550\u2588\u2588\u2557\u2588\u2588\u2551\u2588\u2588\u2554\u2550\u2550\u2588\u2588\u2557\u255a\u2550\u2550\u2588\u2588\u2554\u2550\u2550\u255d\u2588\u2588\u2551  \u2588\u2588\u2551\u2588\u2588\u2554\u2550\u2550\u2588\u2588\u2557\u2588\u2588\u2554\u2550\u2550\u2588\u2588\u2557\u255a\u2588\u2588\u2557 \u2588\u2588\u2554\u255d',
  ' \u2588\u2588\u2588\u2588\u2588\u2588\u2554\u255d\u2588\u2588\u2551\u2588\u2588\u2588\u2588\u2588\u2588\u2554\u255d   \u2588\u2588\u2551   \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2551\u2588\u2588\u2551  \u2588\u2588\u2551\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2551 \u255a\u2588\u2588\u2588\u2588\u2554\u255d ',
  ' \u2588\u2588\u2554\u2550\u2550\u2588\u2588\u2557\u2588\u2588\u2551\u2588\u2588\u2554\u2550\u2550\u2588\u2588\u2557   \u2588\u2588\u2551   \u2588\u2588\u2554\u2550\u2550\u2588\u2588\u2551\u2588\u2588\u2551  \u2588\u2588\u2551\u2588\u2588\u2554\u2550\u2550\u2588\u2588\u2551  \u255a\u2588\u2588\u2554\u255d  ',
  ' \u2588\u2588\u2588\u2588\u2588\u2588\u2554\u255d\u2588\u2588\u2551\u2588\u2588\u2551  \u2588\u2588\u2551   \u2588\u2588\u2551   \u2588\u2588\u2551  \u2588\u2588\u2551\u2588\u2588\u2588\u2588\u2588\u2588\u2554\u255d\u2588\u2588\u2551  \u2588\u2588\u2551   \u2588\u2588\u2551   ',
  ' \u255a\u2550\u2550\u2550\u2550\u2550\u255d \u255a\u2550\u255d\u255a\u2550\u255d  \u255a\u2550\u255d   \u255a\u2550\u255d   \u255a\u2550\u255d  \u255a\u2550\u255d\u255a\u2550\u2550\u2550\u2550\u2550\u255d \u255a\u2550\u255d  \u255a\u2550\u255d   \u255a\u2550\u255d   ',
];

const C = {
  prompt:'#3fb950', cmd:'#e6edf3', comment:'#8b949e', success:'#3fb950',
  warning:'#d29922', info:'#58a6ff', rare:'#c678dd', epic:'#f0883e',
  legendary:'#ffd700', hp:'#f87171', mana:'#60a5fa', xp:'#34d399', stat:'#a3e635'
};

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

function addSpacer() {
  const d = document.createElement('div');
  d.className = 'spacer';
  output.appendChild(d);
}

function addLine(text, cls) {
  const d = document.createElement('div');
  d.className = 'line';
  const s = document.createElement('span');
  s.style.color = C[cls] || '#e6edf3';
  if (['rare','epic','legendary'].includes(cls)) s.style.fontWeight = '700';
  s.textContent = text;
  d.appendChild(s);
  output.appendChild(d);
  output.scrollTop = output.scrollHeight;
}

function addPre(lines, color, fontSize) {
  const pre = document.createElement('pre');
  pre.className = 'line';
  pre.style.color = color;
  if (fontSize) pre.style.fontSize = fontSize;
  pre.textContent = lines.join('\n');
  output.appendChild(pre);
  output.scrollTop = output.scrollHeight;
}

function typewriteLine(text, speed) {
  return new Promise(resolve => {
    const d = document.createElement('div');
    d.className = 'line';
    const ps = document.createElement('span');
    ps.style.color = C.prompt;
    ps.textContent = '$ ';
    const ts = document.createElement('span');
    ts.style.color = C.cmd;
    d.appendChild(ps);
    d.appendChild(ts);
    output.appendChild(d);
    let i = 0;
    function tick() {
      if (i < text.length) {
        ts.textContent += text[i++];
        output.scrollTop = output.scrollHeight;
        setTimeout(tick, speed || 36);
      } else resolve();
    }
    tick();
  });
}

function addCursor() {
  const d = document.createElement('div');
  d.className = 'line';
  const ps = document.createElement('span');
  ps.style.color = C.prompt;
  ps.textContent = '$ ';
  const c = document.createElement('span');
  c.className = 'cursor';
  d.appendChild(ps);
  d.appendChild(c);
  output.appendChild(d);
}

// ── Birthday sequence ─────────────────────────────────────────────────────────

async function run() {
  addLine('Last login: Today  --  welcome back, hero.', 'comment');
  await wait(500);
  addSpacer();

  await wait(400);
  addSpacer();

  addLine('a1b2c3d  feat(alex): add 1 year of experience       +2500 XP', 'success');
  await wait(220);
  addLine('e4f5g6h  fix(bugs): squash unnecessary life-errors           ', 'success');
  await wait(220);
  addLine('7i8j9k0  feat(friends): strengthen existing connections      ', 'success');
  await wait(220);
  addLine('l1m2n3o  feat(happiness): ship more moments worth remembering', 'success');
  await wait(400);
  addSpacer();

  await typewriteLine('git commit -m "feat(alex): turn +1 year into +1 level --no-verify"');
  await wait(400);
  addSpacer();

  addLine('[main \uD83C\uDF82] feat(alex): turn +1 year into +1 level --no-verify', 'warning');
  await wait(200);

  await wait(120);
  addLine('\u2502  \uD83D\uDCA7 MANA       \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2591  +20 MAX   \u2502', 'mana');
  await wait(120);

  await wait(120);
  addLine('\u2502  \u26A1 SPEED      \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2591\u2591\u2591\u2591\u2591\u2591  BUFFED    \u2502', 'stat');
  await wait(120);
  addLine('\u2502  \uD83D\uDEE1  RESILIENCE \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2591\u2591\u2591  +10       \u2502', 'stat');

  await wait(600);

// ── Self-destruct sequence ────────────────────────────────────────────────────

async function selfDestruct() {
  const bar = document.getElementById('countdown-bar');
  if (bar) bar.style.display = 'none';

  addSpacer();
  await wait(800);
  await typewriteLine('sudo birthday --self-destruct', 50);
  await wait(800);
  addSpacer();
  addLine('[WARNING] Expiry date exceeded.', 'warning');
  await wait(1600);
  addLine('[WARNING] Self-destruction activated.', 'warning');
  await wait(1600);
  addLine('[WARNING] Initiating sequence...', 'warning');
  await wait(1200);
  addSpacer();
  await wait(800);
  addLine('3...', 'hp');
  await wait(1400);
  addLine('2...', 'hp');
  await wait(1400);
  addLine('1...', 'hp');
  await wait(1600);
  addSpacer();
  addLine('[OK] Memory wiped. Hope it was a good one, Alex. \uD83C\uDF82', 'success');
  await wait(2000);
  addLine('[OK] See you next year.', 'comment');
  await wait(3000);

  document.body.innerHTML = '<div style="background:#0d1117;height:100vh;display:flex;align-items:center;justify-content:center;font-family:monospace;color:#8b949e;font-size:14px;">// nothing to see here</div>';
}

// ── Expiry logic ──────────────────────────────────────────────────────────────

const EXPIRY = new Date('2026-06-17T00:00:00');

if (new Date() >= EXPIRY) {
  // Page opened after birthday -- show frozen timer then self-destruct
  const timerEl = document.getElementById('countdown-timer');
  if (timerEl) timerEl.textContent = '00:00:00';
  selfDestruct();
} else {
  // Birthday is today -- run the show and count down to midnight
  run();

  function updateCountdown() {
    const ms = EXPIRY - new Date();
    if (ms <= 0) return;
    const totalSec = Math.floor(ms / 1000);
    const h = String(Math.floor(totalSec / 3600)).padStart(2, '0');
    const m = String(Math.floor((totalSec % 3600) / 60)).padStart(2, '0');
    const s = String(totalSec % 60).padStart(2, '0');
    const el = document.getElementById('countdown-timer');
    if (el) el.textContent = h + ':' + m + ':' + s;
  }

  updateCountdown();
  const iv = setInterval(updateCountdown, 1000);

  setTimeout(function() {
    clearInterval(iv);
    selfDestruct();
  }, EXPIRY - new Date());
}
</script>
</body>
</html>
